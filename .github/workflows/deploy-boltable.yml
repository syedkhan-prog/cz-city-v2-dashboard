name: Deploy to Boltable

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-boltable-cz-city-v2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror main to boltable/cz-city-v2-dashboard
        env:
          BOLTABLE_DEPLOY_KEY: ${{ secrets.BOLTABLE_DEPLOY_KEY }}
          BOLTABLE_PUSH_TOKEN: ${{ secrets.BOLTABLE_PUSH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$BOLTABLE_DEPLOY_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$BOLTABLE_DEPLOY_KEY" > ~/.ssh/boltable_deploy_key
            chmod 600 ~/.ssh/boltable_deploy_key
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
            git remote add boltable "git@github.com:boltable/cz-city-v2-dashboard.git"
            GIT_SSH_COMMAND='ssh -i ~/.ssh/boltable_deploy_key -o IdentitiesOnly=yes' git push boltable HEAD:main
          elif [ -n "$BOLTABLE_PUSH_TOKEN" ]; then
            git remote add boltable "https://x-access-token:${BOLTABLE_PUSH_TOKEN}@github.com/boltable/cz-city-v2-dashboard.git"
            git push boltable HEAD:main
          else
            echo "Set BOLTABLE_DEPLOY_KEY or BOLTABLE_PUSH_TOKEN in repo secrets."
            exit 1
          fi
