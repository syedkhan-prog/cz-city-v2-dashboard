name: Refresh CZ City V2 Dashboard

# Primary refresh: local Monday 11:00 — scripts/refresh_and_push.sh (+ launchd or n8n SSH).
# Push to main triggers deploy-boltable.yml → boltable/cz-city-v2-dashboard.
# This workflow is a manual fallback only (GitHub → Databricks is slow/unreliable).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-cz-city-v2-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull all data from Databricks (single job, local-style)
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python fetch.py
          python build.py --no-local

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json docs/index.html boltable/index.html
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "auto-refresh data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
