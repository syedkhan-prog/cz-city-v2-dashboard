name: Refresh CZ City V2 Dashboard

# Runs on syedkhan-prog/cz-city-v2-dashboard.
# Push to main triggers deploy-boltable.yml → boltable/cz-city-v2-dashboard.

on:
  workflow_dispatch:
  schedule:
    # Every Monday 12:00 Europe/Prague
    - cron: "0 12 * * 1"
      timezone: "Europe/Prague"

permissions:
  contents: write

concurrency:
  group: refresh-cz-city-v2-dashboard
  cancel-in-progress: false

jobs:
  fetch-core:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pull core metrics from Databricks
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python fetch.py --batch core --out partial-core.json
      - uses: actions/upload-artifact@v4
        with:
          name: partial-core
          path: partial-core.json
          retention-days: 1

  fetch-cohort:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pull cohort metrics from Databricks
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python fetch.py --batch cohort --out partial-cohort.json
      - uses: actions/upload-artifact@v4
        with:
          name: partial-cohort
          path: partial-cohort.json
          retention-days: 1

  assemble:
    needs: [fetch-core, fetch-cohort]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          name: partial-core
          path: artifacts/core
      - uses: actions/download-artifact@v4
        with:
          name: partial-cohort
          path: artifacts/cohort
      - name: Merge, build HTML, commit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python fetch.py --merge artifacts/core/partial-core.json artifacts/cohort/partial-cohort.json --out data.json
          python build.py --no-local
          echo "generated_at=$(python -c "import json;print(json.load(open('data.json'))['meta']['generated_at'])")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json docs/index.html boltable/index.html
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "auto-refresh data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
