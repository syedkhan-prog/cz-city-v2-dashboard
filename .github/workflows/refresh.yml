name: Refresh CZ City V2 Dashboard

# Runs on syedkhan-prog/cz-city-v2-dashboard.
# Push to main triggers deploy-boltable.yml → boltable/cz-city-v2-dashboard.

on:
  workflow_dispatch:
  schedule:
    # Every Monday 12:00 Europe/Prague
    - cron: "0 12 * * 1"
      timezone: "Europe/Prague"

permissions:
  contents: write

concurrency:
  group: refresh-cz-city-v2-dashboard
  cancel-in-progress: false

jobs:
  fetch:
    strategy:
      fail-fast: false
      matrix:
        query:
          - city_weekly
          - activation_weekly
          - subs_weekly
          - provider_top
          - objective_weekly
          - cohort_depth
          - cohort_freq
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pull ${{ matrix.query }} from Databricks
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python fetch.py --query ${{ matrix.query }} --out partial-${{ matrix.query }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: partial-${{ matrix.query }}
          path: partial-${{ matrix.query }}.json
          retention-days: 1

  assemble:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: partial-*
          merge-multiple: true
      - name: Merge, build HTML, commit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          ls -la artifacts/
          python fetch.py --merge artifacts/partial-*.json --out data.json
          python build.py --no-local
          echo "generated_at=$(python -c "import json;print(json.load(open('data.json'))['meta']['generated_at'])")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json docs/index.html boltable/index.html
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "auto-refresh data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
